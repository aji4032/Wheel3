Configuration:
  status: info
  shutdownHook: disable
  packages: logger
  Appenders:
    Console:
      name: Console
      target: SYSTEM_OUT
      PatternLayout:
        pattern: "\u001B[33m%d{yyyy-MM-dd HH:mm:ss.SSS}\u001B[0m [%-4t] \u001B[34m[%-5p]\u001B[0m %cyan{%-35c} :%m%n%ex"

    # This assumes a custom appender or a standard one is intended here. 
    # Since the user started defining TestNgLogger under Appenders, 
    # we provide a standard configuration structure for it.
    TestNgLogger:
      name: TestNgLogger
      PatternLayout:
        pattern: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%t] %-5level %logger{36} - %msg%n"

    Async:
      name: AsyncLogger
      AppenderRef:
        - ref: Console

  Loggers:
    Root:
      level: trace
      AppenderRef:
        - ref: AsyncLogger
          level: trace
        - ref: TestNgLogger